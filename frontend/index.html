<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Support Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-container { width: 420px; height: 600px; background: white; border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    .chat-header { background: #2E4057; color: white; padding: 16px 20px; font-size: 16px; font-weight: bold; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .message.user { background: #2E4057; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .message.bot { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 24px; font-size: 14px; outline: none; }
    .chat-input button { background: #2E4057; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Support Chat</div>
    <div class="chat-messages" id="messages">
      <div class="message bot">Hi! How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">&#9658;</button>
    </div>
  </div>
  <script>
    const history = [];
    async function sendMessage() {
    const input = document.getElementById('userInput');
    const message = input.value.trim();
      if (!message) return;
      addMessage(message, 'user');
      input.value = '';
      history.push({ role: 'user', content: message });
try {

 try {

  const res = await fetch('https://customer-support-bot-hmse.onrender.com/chat', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ message, history })
  });

  console.log("STATUS:", res.status);

  const text = await res.text();

  console.log("RAW RESPONSE:", text);

  const data = JSON.parse(text);

  addMessage(data.reply, 'bot');

  history.push({
    role: 'assistant',
    content: data.reply
  });

} catch (err) {

  console.error("FETCH ERROR:", err);

  addMessage("Server error", "bot");
}

  const text = await res.text();

  console.log("RAW RESPONSE:", text);

  const data = JSON.parse(text);

  addMessage(data.reply, 'bot');

  history.push({
    role: 'assistant',
    content: data.reply
  });

} catch (err) {

  console.error("FETCH ERROR:", err);

  addMessage("Server error", "bot");
}

      addMessage(data.reply, 'bot');
      history.push({ role: 'assistant', content: data.reply });
    }
    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = 'message ' + sender;
      div.textContent = text;
      document.getElementById('messages').appendChild(div);
      document.getElementById('messages').scrollTop = 999999;
    }
    document.getElementById('userInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
